<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste - Listar Clientes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 10px;
      backdrop-filter: blur(10px);
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover { background: #45a049; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #result {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 5px;
      white-space: pre-wrap;
      font-family: monospace;
      max-height: 600px;
      overflow-y: auto;
    }
    .success { color: #4CAF50; font-weight: bold; }
    .error { color: #ff6b6b; font-weight: bold; }
    .warning { color: #ffd93d; font-weight: bold; }
    .info { color: #6bcf7f; }
    .client-card {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      margin: 10px 0;
      border-radius: 5px;
      border-left: 4px solid #4CAF50;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Teste - Listar Clientes</h1>
    <p class="info">Esta página verifica se os clientes estão sendo carregados corretamente do IndexedDB.</p>
    
    <button onclick="testarClientes()">📋 Listar Clientes do IndexedDB</button>
    <button onclick="testarSheetDB()">☁️ Buscar Clientes do Google Sheets</button>
    <button onclick="irParaSistema()">🚀 Voltar ao Sistema</button>
    
    <div id="result"></div>
  </div>

  <script src="db.js"></script>
  <script src="config.js"></script>
  <script>
    const resultDiv = document.getElementById('result');

    async function testarClientes() {
      resultDiv.innerHTML = '<span class="info">🔍 Testando IndexedDB...</span>\n\n';
      
      try {
        // Abrir banco
        await openDB();
        resultDiv.innerHTML += '<span class="success">✅ Banco de dados aberto</span>\n\n';
        
        // Buscar clientes
        const clients = await getAll('clients');
        resultDiv.innerHTML += `<span class="success">✅ Total de clientes: ${clients.length}</span>\n\n`;
        
        if (clients.length === 0) {
          resultDiv.innerHTML += '<span class="warning">⚠️ Nenhum cliente encontrado no IndexedDB</span>\n';
          resultDiv.innerHTML += '<span class="info">💡 Sugestões:</span>\n';
          resultDiv.innerHTML += '1. Cadastre um novo cliente no sistema\n';
          resultDiv.innerHTML += '2. Ou clique em "Buscar Clientes do Google Sheets" para importar\n';
          return;
        }
        
        resultDiv.innerHTML += '<span class="info">📋 Clientes encontrados:</span>\n\n';
        clients.forEach((client, index) => {
          resultDiv.innerHTML += `<div class="client-card">`;
          resultDiv.innerHTML += `<strong>👤 ${index + 1}. ${client.name || 'Sem nome'}</strong>\n`;
          resultDiv.innerHTML += `ID: ${client.id}\n`;
          resultDiv.innerHTML += `Cidade: ${client.city || '-'}\n`;
          resultDiv.innerHTML += `Vendedor: ${client.seller || '-'}\n`;
          if (client.email_client) resultDiv.innerHTML += `Email Cliente: ${client.email_client}\n`;
          if (client.created_at) resultDiv.innerHTML += `Criado em: ${new Date(client.created_at).toLocaleString('pt-BR')}\n`;
          resultDiv.innerHTML += `</div>\n`;
        });
        
      } catch (error) {
        resultDiv.innerHTML += `<span class="error">❌ ERRO: ${error.message}</span>\n`;
        console.error(error);
      }
    }

    async function testarSheetDB() {
      resultDiv.innerHTML = '<span class="info">☁️ Testando conexão com Google Sheets...</span>\n\n';
      
      try {
        if (!CONFIG.SHEETDB_BASE || CONFIG.SHEETDB_BASE.includes('YOUR_SHEETDB_ID')) {
          resultDiv.innerHTML += '<span class="error">❌ SheetDB não configurado em config.js</span>\n';
          return;
        }
        
        resultDiv.innerHTML += `<span class="info">📡 API Base: ${CONFIG.SHEETDB_BASE}</span>\n\n`;
        
        const response = await fetch(`${CONFIG.SHEETDB_BASE}?sheet=Clientes`);
        resultDiv.innerHTML += `<span class="info">Status da resposta: ${response.status}</span>\n\n`;
        
        if (!response.ok) {
          resultDiv.innerHTML += `<span class="error">❌ Erro ${response.status}: Não conseguiu buscar dados</span>\n`;
          return;
        }
        
        const data = await response.json();
        resultDiv.innerHTML += `<span class="success">✅ Clientes encontrados no Google Sheets: ${data.length}</span>\n\n`;
        
        if (data.length === 0) {
          resultDiv.innerHTML += '<span class="warning">⚠️ Nenhum cliente na planilha Google Sheets</span>\n';
          return;
        }
        
        resultDiv.innerHTML += '<span class="info">📋 Clientes do Google Sheets:</span>\n\n';
        data.forEach((client, index) => {
          resultDiv.innerHTML += `<div class="client-card">`;
          resultDiv.innerHTML += `<strong>👤 ${index + 1}. ${client.name || 'Sem nome'}</strong>\n`;
          resultDiv.innerHTML += `ID: ${client.id}\n`;
          resultDiv.innerHTML += `Cidade: ${client.city || '-'}\n`;
          resultDiv.innerHTML += `Vendedor: ${client.seller || '-'}\n`;
          if (client.email_client) resultDiv.innerHTML += `Email: ${client.email_client}\n`;
          resultDiv.innerHTML += `</div>\n`;
        });
        
        resultDiv.innerHTML += '\n<span class="success">💡 Para importar esses dados para o sistema, clique em "🔄 Atualizar" no sistema principal!</span>\n';
        
      } catch (error) {
        resultDiv.innerHTML += `<span class="error">❌ ERRO: ${error.message}</span>\n`;
        console.error(error);
      }
    }

    function irParaSistema() {
      window.location.href = '/index.html';
    }

    // Testar automaticamente ao carregar
    window.addEventListener('load', testarClientes);
  </script>
</body>
</html>
