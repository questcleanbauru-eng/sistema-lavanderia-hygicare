<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste SheetDB</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 10px;
      backdrop-filter: blur(10px);
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover {
      background: #45a049;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 5px;
      white-space: pre-wrap;
      font-family: monospace;
      max-height: 400px;
      overflow-y: auto;
    }
    .success {
      color: #4CAF50;
      font-weight: bold;
    }
    .error {
      color: #ff6b6b;
      font-weight: bold;
    }
    .warning {
      color: #ffd93d;
      font-weight: bold;
    }
    .info {
      color: #6bcf7f;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Teste de Conexão SheetDB</h1>
    <p class="warning">⚠️ Cuidado: Você tem apenas 500 acessos por mês!</p>
    <p class="info">Este teste usará apenas 1 acesso para buscar os usuários.</p>
    
    <button id="btnTest" onclick="testConnection()">🚀 Testar Conexão (1 acesso)</button>
    
    <div id="result"></div>
  </div>

  <script>
    const API_BASE = 'https://sheetdb.io/api/v1/5lsko6foc4tpj';
    const resultDiv = document.getElementById('result');
    const btnTest = document.getElementById('btnTest');

    async function testConnection() {
      btnTest.disabled = true;
      resultDiv.innerHTML = '<span class="info">⏳ Testando conexão com SheetDB...</span>\n';
      
      try {
        const response = await fetch(`${API_BASE}?sheet=Usuarios`);
        
        resultDiv.innerHTML += `<span class="info">📡 Status: ${response.status} ${response.statusText}</span>\n\n`;
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        
        resultDiv.innerHTML += `<span class="success">✅ SUCESSO! Conectado ao SheetDB</span>\n\n`;
        resultDiv.innerHTML += `<span class="info">📊 Usuários encontrados: ${data.length}</span>\n\n`;
        
        if (data.length > 0) {
          resultDiv.innerHTML += '<span class="info">👥 Dados dos usuários:</span>\n';
          data.forEach((user, i) => {
            resultDiv.innerHTML += `\n${i + 1}. ${user.name || user.username}\n`;
            resultDiv.innerHTML += `   - Username: ${user.username}\n`;
            resultDiv.innerHTML += `   - Role: ${user.role}\n`;
            resultDiv.innerHTML += `   - Active: ${user.active}\n`;
          });
          
          resultDiv.innerHTML += '\n<span class="success">✅ O sistema de login está pronto para funcionar!</span>\n';
          resultDiv.innerHTML += '<span class="info">💡 Você pode fazer login no sistema principal agora.</span>\n';
        } else {
          resultDiv.innerHTML += '<span class="warning">⚠️ Nenhum usuário encontrado na aba "Usuarios"</span>\n';
          resultDiv.innerHTML += '<span class="info">💡 Adicione usuários na planilha do Google Sheets.</span>\n';
        }
        
      } catch (error) {
        resultDiv.innerHTML += `<span class="error">❌ ERRO: ${error.message}</span>\n\n`;
        resultDiv.innerHTML += '<span class="warning">Possíveis causas:</span>\n';
        resultDiv.innerHTML += '1. A aba "Usuarios" não existe na planilha\n';
        resultDiv.innerHTML += '2. A API key do SheetDB está incorreta\n';
        resultDiv.innerHTML += '3. A planilha não está compartilhada com o SheetDB\n';
        resultDiv.innerHTML += '4. Problema de conexão com a internet\n';
      }
      
      btnTest.disabled = false;
    }
  </script>
</body>
</html>
