<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listar Abas SheetDB</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 10px;
      backdrop-filter: blur(10px);
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover {
      background: #45a049;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 5px;
      white-space: pre-wrap;
      font-family: monospace;
      max-height: 500px;
      overflow-y: auto;
    }
    .success { color: #4CAF50; font-weight: bold; }
    .error { color: #ff6b6b; font-weight: bold; }
    .warning { color: #ffd93d; font-weight: bold; }
    .info { color: #6bcf7f; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 Descobrir Abas Disponíveis</h1>
    <p class="warning">⚠️ Este teste usa 1 acesso apenas</p>
    
    <p class="info">
      Este teste vai buscar dados da planilha e descobrir quais abas o SheetDB reconhece.
    </p>
    
    <button onclick="listSheets()">📋 Listar Abas Disponíveis (1 acesso)</button>
    
    <div id="result"></div>
  </div>

  <script>
    const API_BASE = 'https://sheetdb.io/api/v1/5lsko6foc4tpj';
    const resultDiv = document.getElementById('result');

    async function listSheets() {
      resultDiv.innerHTML = '<span class="info">📡 Conectando ao SheetDB...</span>\n\n';
      
      try {
        // Buscar sem especificar aba - deve retornar a primeira aba ou dados gerais
        const response = await fetch(API_BASE);
        
        resultDiv.innerHTML += `<span class="info">Status: ${response.status} ${response.statusText}</span>\n\n`;
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        
        resultDiv.innerHTML += `<span class="success">✅ Conexão com SheetDB funcionando!</span>\n\n`;
        
        if (Array.isArray(data) && data.length > 0) {
          resultDiv.innerHTML += `<span class="info">📊 Registros encontrados: ${data.length}</span>\n\n`;
          resultDiv.innerHTML += '<span class="info">📋 Campos disponíveis no primeiro registro:</span>\n';
          
          const firstRecord = data[0];
          for (const key in firstRecord) {
            resultDiv.innerHTML += `   • ${key}\n`;
          }
          
          resultDiv.innerHTML += '\n<span class="success">✅ Aba padrão está funcionando!</span>\n';
          resultDiv.innerHTML += '<span class="warning">💡 Agora vamos testar nomes específicos...</span>\n\n';
          
          // Testar variações do nome
          await testVariations();
        } else {
          resultDiv.innerHTML += '<span class="warning">⚠️ Nenhum registro encontrado na aba padrão</span>\n';
        }
        
      } catch (error) {
        resultDiv.innerHTML += `<span class="error">❌ ERRO: ${error.message}</span>\n\n`;
        resultDiv.innerHTML += '<span class="warning">🔧 Possível solução:</span>\n';
        resultDiv.innerHTML += '1. Verifique se a planilha está conectada ao SheetDB\n';
        resultDiv.innerHTML += '2. Acesse https://sheetdb.io e reconecte a planilha\n';
        resultDiv.innerHTML += '3. Confirme que o ID da API está correto: mmi3q5b357t7z\n';
      }
    }

    async function testVariations() {
      const variations = [
        'Usuarios',
        'usuarios', 
        'USUARIOS',
        'Usuários',
        'Users',
        'Sheet1',
        'Planilha1'
      ];
      
      resultDiv.innerHTML += '<span class="warning">🔍 Testando variações de nomes...</span>\n\n';
      
      for (const name of variations) {
        try {
          const response = await fetch(`${API_BASE}/${name}`);
          
          if (response.ok) {
            const data = await response.json();
            resultDiv.innerHTML += `<span class="success">✅ "${name}" FUNCIONA! (${data.length} registros)</span>\n`;
            
            if (name !== 'Usuarios') {
              resultDiv.innerHTML += `\n<span class="warning">⚠️ ATENÇÃO: Use "${name}" no config.js!</span>\n`;
              resultDiv.innerHTML += `<span class="info">Altere: USERS: "${name}"</span>\n\n`;
            }
            
            return; // Encontrou! Parar teste
          }
        } catch (e) {
          // Ignorar erros e continuar testando
        }
      }
      
      resultDiv.innerHTML += '\n<span class="error">❌ Nenhuma variação funcionou</span>\n';
      resultDiv.innerHTML += '<span class="info">💡 Solução: Acesse SheetDB e verifique a lista de abas</span>\n';
    }
  </script>
</body>
</html>
