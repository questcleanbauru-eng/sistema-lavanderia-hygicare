<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste Direto SheetDB</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 10px;
      backdrop-filter: blur(10px);
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover { background: #45a049; }
    #result {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 5px;
      white-space: pre-wrap;
      font-family: monospace;
      max-height: 500px;
      overflow-y: auto;
    }
    .success { color: #4CAF50; font-weight: bold; }
    .error { color: #ff6b6b; font-weight: bold; }
    .warning { color: #ffd93d; font-weight: bold; }
    .info { color: #6bcf7f; }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
      font-size: 14px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Teste Completo SheetDB</h1>
    <p class="warning">⚠️ Cada teste usa 1 acesso</p>
    
    <h3>📋 URLs para testar:</h3>
    
    <button onclick="testURL('https://sheetdb.io/api/v1/5lsko6foc4tpj')">
      1️⃣ Base (sem aba)
    </button>
    
    <button onclick="testURL('https://sheetdb.io/api/v1/5lsko6foc4tpj/Usuarios')">
      2️⃣ /Usuarios (barra)
    </button>
    
    <button onclick="testURL('https://sheetdb.io/api/v1/5lsko6foc4tpj?sheet=Usuarios')">
      3️⃣ ?sheet=Usuarios (parâmetro)
    </button>
    
    <button onclick="testURL('https://sheetdb.io/api/v1/5lsko6foc4tpj/tabs/Usuarios')">
      4️⃣ /tabs/Usuarios
    </button>
    
    <h3>🎯 Ou teste uma URL personalizada:</h3>
    <input type="text" id="customURL" value="https://sheetdb.io/api/v1/5lsko6foc4tpj?sheet=Usuarios" placeholder="Cole a URL aqui">
    <button onclick="testCustomURL()">🚀 Testar URL Personalizada</button>
    
    <div id="result"></div>
  </div>

  <script>
    const resultDiv = document.getElementById('result');

    async function testURL(url) {
      resultDiv.innerHTML = `<span class="info">🔍 Testando: ${url}</span>\n\n`;
      
      try {
        const response = await fetch(url);
        
        resultDiv.innerHTML += `<span class="info">📡 Status: ${response.status} ${response.statusText}</span>\n\n`;
        
        if (response.ok) {
          const data = await response.json();
          
          resultDiv.innerHTML += `<span class="success">✅ SUCESSO!</span>\n\n`;
          resultDiv.innerHTML += `<span class="info">📊 Tipo de resposta: ${Array.isArray(data) ? 'Array' : 'Object'}</span>\n`;
          
          if (Array.isArray(data)) {
            resultDiv.innerHTML += `<span class="info">📊 Registros: ${data.length}</span>\n\n`;
            
            if (data.length > 0) {
              resultDiv.innerHTML += `<span class="info">📋 Primeiro registro:</span>\n`;
              resultDiv.innerHTML += JSON.stringify(data[0], null, 2) + '\n\n';
              
              resultDiv.innerHTML += `<span class="success">🎉 USE ESTA URL NO CÓDIGO!</span>\n`;
              resultDiv.innerHTML += `<span class="warning">URL: ${url}</span>\n`;
            } else {
              resultDiv.innerHTML += `<span class="warning">⚠️ Aba vazia (0 registros)</span>\n`;
            }
          } else {
            resultDiv.innerHTML += `<span class="info">📋 Resposta:</span>\n`;
            resultDiv.innerHTML += JSON.stringify(data, null, 2) + '\n';
          }
        } else {
          resultDiv.innerHTML += `<span class="error">❌ ERRO ${response.status}</span>\n`;
          
          if (response.status === 404) {
            resultDiv.innerHTML += `<span class="warning">💡 Esta URL não funciona. Tente outra!</span>\n`;
          }
        }
        
      } catch (error) {
        resultDiv.innerHTML += `<span class="error">❌ ERRO: ${error.message}</span>\n`;
      }
    }

    async function testCustomURL() {
      const url = document.getElementById('customURL').value.trim();
      if (!url) {
        resultDiv.innerHTML = '<span class="error">❌ Digite uma URL!</span>';
        return;
      }
      await testURL(url);
    }
  </script>
</body>
</html>
