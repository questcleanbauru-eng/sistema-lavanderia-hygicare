<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico SheetDB</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 10px;
      backdrop-filter: blur(10px);
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover {
      background: #45a049;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 5px;
      white-space: pre-wrap;
      font-family: monospace;
      max-height: 500px;
      overflow-y: auto;
    }
    .success { color: #4CAF50; font-weight: bold; }
    .error { color: #ff6b6b; font-weight: bold; }
    .warning { color: #ffd93d; font-weight: bold; }
    .info { color: #6bcf7f; }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 2px solid #fff;
      font-size: 14px;
    }
    .step {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      margin: 10px 0;
      border-radius: 5px;
      border-left: 4px solid #4CAF50;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Diagnóstico SheetDB</h1>
    <p class="warning">⚠️ Este teste usa até 4 acessos (1 para cada aba)</p>
    
    <div class="step">
      <h3>📋 Abas que vamos testar:</h3>
      <p class="info">
        1. Usuarios (para login)<br>
        2. Clientes<br>
        3. Maquinas<br>
        4. Processos<br>
        5. Registros
      </p>
    </div>

    <div class="step">
      <h3>💡 Nomes alternativos para testar:</h3>
      <label>Nome da aba de usuários (case-sensitive):</label>
      <input type="text" id="sheetName" value="Usuarios" placeholder="Ex: Usuarios, usuarios, Users, Login">
    </div>
    
    <button onclick="testAllSheets()">🔍 Testar Todas as Abas</button>
    <button onclick="testCustomSheet()">🎯 Testar Nome Personalizado</button>
    
    <div id="result"></div>
  </div>

  <script>
    const API_BASE = 'https://sheetdb.io/api/v1/mmi3q5b357t7z';
    const resultDiv = document.getElementById('result');

    async function testSheet(sheetName) {
      try {
        const response = await fetch(`${API_BASE}/${sheetName}`);
        return {
          name: sheetName,
          status: response.status,
          ok: response.ok,
          data: response.ok ? await response.json() : null
        };
      } catch (error) {
        return {
          name: sheetName,
          status: 'error',
          ok: false,
          error: error.message
        };
      }
    }

    async function testAllSheets() {
      resultDiv.innerHTML = '<span class="info">🔍 Testando todas as abas...</span>\n\n';
      
      const sheets = ['Usuarios', 'Clientes', 'Maquinas', 'Processos', 'Registros'];
      
      for (const sheet of sheets) {
        const result = await testSheet(sheet);
        
        if (result.ok) {
          const count = result.data ? result.data.length : 0;
          resultDiv.innerHTML += `<span class="success">✅ ${sheet}: ENCONTRADA (${count} registros)</span>\n`;
        } else {
          resultDiv.innerHTML += `<span class="error">❌ ${sheet}: NÃO ENCONTRADA (Status: ${result.status})</span>\n`;
        }
      }
      
      resultDiv.innerHTML += '\n<span class="warning">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>\n\n';
      resultDiv.innerHTML += '<span class="info">💡 Solução:</span>\n\n';
      resultDiv.innerHTML += '1. Abra sua planilha no Google Sheets\n';
      resultDiv.innerHTML += '2. Verifique os nomes EXATOS das abas (case-sensitive)\n';
      resultDiv.innerHTML += '3. As abas devem ter esses nomes:\n';
      resultDiv.innerHTML += '   • Usuarios (sem acento)\n';
      resultDiv.innerHTML += '   • Clientes\n';
      resultDiv.innerHTML += '   • Maquinas (sem acento)\n';
      resultDiv.innerHTML += '   • Processos\n';
      resultDiv.innerHTML += '   • Registros\n';
      resultDiv.innerHTML += '4. Se os nomes estiverem diferentes, renomeie as abas\n';
      resultDiv.innerHTML += '5. Ou me informe os nomes corretos para ajustar o código\n';
    }

    async function testCustomSheet() {
      const sheetName = document.getElementById('sheetName').value.trim();
      
      if (!sheetName) {
        resultDiv.innerHTML = '<span class="error">❌ Digite um nome de aba para testar!</span>';
        return;
      }
      
      resultDiv.innerHTML = `<span class="info">🔍 Testando aba "${sheetName}"...</span>\n\n`;
      
      const result = await testSheet(sheetName);
      
      if (result.ok) {
        const count = result.data ? result.data.length : 0;
        resultDiv.innerHTML += `<span class="success">✅ SUCESSO! Aba "${sheetName}" encontrada!</span>\n`;
        resultDiv.innerHTML += `<span class="info">📊 Registros encontrados: ${count}</span>\n\n`;
        
        if (count > 0 && result.data.length > 0) {
          resultDiv.innerHTML += '<span class="info">📋 Primeiros campos do registro 1:</span>\n';
          const firstRecord = result.data[0];
          for (const key in firstRecord) {
            resultDiv.innerHTML += `   • ${key}: ${firstRecord[key]}\n`;
          }
        }
        
        resultDiv.innerHTML += '\n<span class="success">✅ Use este nome no config.js!</span>\n';
      } else {
        resultDiv.innerHTML += `<span class="error">❌ Aba "${sheetName}" não encontrada (Status: ${result.status})</span>\n\n`;
        resultDiv.innerHTML += '<span class="warning">Tente variações:</span>\n';
        resultDiv.innerHTML += `   • ${sheetName.toLowerCase()}\n`;
        resultDiv.innerHTML += `   • ${sheetName.toUpperCase()}\n`;
        resultDiv.innerHTML += `   • ${sheetName.charAt(0).toUpperCase() + sheetName.slice(1).toLowerCase()}\n`;
      }
    }
  </script>
</body>
</html>
