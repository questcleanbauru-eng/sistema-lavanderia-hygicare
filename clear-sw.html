<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limpar Service Worker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 100px auto;
      padding: 20px;
      text-align: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 100vh;
    }
    .container {
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 10px;
      backdrop-filter: blur(10px);
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
    }
    button:hover { background: #45a049; }
    #result {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 5px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧹 Limpar Service Worker</h1>
    <p>Use esta página para limpar completamente o Service Worker e cache antigos.</p>
    
    <button onclick="clearEverything()">🗑️ Limpar Tudo</button>
    <button onclick="goToApp()">🚀 Ir para o App</button>
    
    <div id="result"></div>
  </div>

  <script>
    const resultDiv = document.getElementById('result');

    async function clearEverything() {
      resultDiv.innerHTML = '<p>🔄 Limpando...</p>';
      
      try {
        // 1. Desregistrar todos os service workers
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (let registration of registrations) {
            await registration.unregister();
          }
          resultDiv.innerHTML += '<p>✅ Service Workers desregistrados</p>';
        }
        
        // 2. Limpar todos os caches
        const cacheNames = await caches.keys();
        for (let name of cacheNames) {
          await caches.delete(name);
        }
        resultDiv.innerHTML += '<p>✅ Caches limpos</p>';
        
        // 3. Limpar localStorage (opcional)
        // localStorage.clear();
        // resultDiv.innerHTML += '<p>✅ LocalStorage limpo</p>';
        
        resultDiv.innerHTML += '<p><strong>🎉 Tudo limpo!</strong></p>';
        resultDiv.innerHTML += '<p>Agora clique em "Ir para o App" ou recarregue a página.</p>';
        
      } catch (error) {
        resultDiv.innerHTML += `<p>❌ Erro: ${error.message}</p>`;
      }
    }

    function goToApp() {
      window.location.href = '/index.html';
    }
  </script>
</body>
</html>
